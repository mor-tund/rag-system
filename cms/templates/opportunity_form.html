{% extends "base.html" %}
{% block title %}{{ 'Sửa' if opp else 'Tạo' }} Proposal — RAG CMS{% endblock %}
{% block body %}
<h1>{{ 'Sửa' if opp else 'Tạo' }} Proposal</h1>
<form class="card" method="post" action="{{ action }}">
  <label>Tên dự án *</label>
  <input name="name" required value="{{ opp.name if opp else '' }}">
  <div class="row">
    <div><label>Khách hàng</label><input name="customer" value="{{ opp.customer or '' if opp else '' }}"></div>
    <div><label>Bộ phận</label><input name="department" value="{{ opp.department or '' if opp else '' }}"></div>
  </div>
  <div class="row">
    <div><label>Loại (doc_type)</label><input name="doc_type" value="{{ opp.doc_type or '' if opp else 'estimate' }}"></div>
    <div><label>Trạng thái</label>
      <select name="status">
        {% set st = opp.status if opp else 'draft' %}
        {% for s in ['draft','running','won','lost'] %}
        <option value="{{ s }}" {{ 'selected' if st==s else '' }}>{{ s }}</option>{% endfor %}
      </select>
    </div>
  </div>
  <label>Tech stack</label>
  <input name="tech_stack" value="{{ opp.tech_stack or '' if opp else '' }}">
  <div class="row">
    <div><label>Effort (MM)</label><input name="total_effort_mm" value="{{ opp.total_effort_mm if opp and opp.total_effort_mm is not none else '' }}"></div>
    <div><label>Effort (MD)</label><input name="total_effort_md" value="{{ opp.total_effort_md if opp and opp.total_effort_md is not none else '' }}"></div>
    <div><label>Số tháng</label><input name="timeline_months" value="{{ opp.timeline_months if opp and opp.timeline_months is not none else '' }}"></div>
  </div>
  <div class="row">
    <div><label>Ngân sách</label><input name="budget" value="{{ opp.budget if opp and opp.budget is not none else '' }}"></div>
    <div><label>Ngôn ngữ</label><input name="language" value="{{ opp.language or '' if opp else '' }}"></div>
    <div><label>Ngày nguồn (YYYY-MM-DD)</label><input name="source_date" value="{{ opp.source_date if opp and opp.source_date else '' }}"></div>
  </div>
  <label>Owner (sale)</label>
  <input name="owner" value="{{ opp.owner or '' if opp else '' }}">
  <label>Mô tả</label>
  <textarea name="description">{{ opp.description or '' if opp else '' }}</textarea>
  <div class="actions" style="margin-top:14px">
    <button type="submit">Lưu</button>
    <a class="btn sec" href="{{ '/opportunities/' ~ opp.id if opp else '/opportunities' }}">Huỷ</a>
  </div>
</form>
{% endblock %}
