<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RAG CMS{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
           margin: 0; background: #f4f5f7; color: #1f2430; }
    header { background: #1f2937; color: #fff; padding: 12px 24px; display: flex;
             align-items: center; gap: 20px; }
    header a { color: #cbd5e1; text-decoration: none; font-weight: 500; }
    header a:hover { color: #fff; }
    header .brand { font-weight: 700; color: #fff; font-size: 18px; }
    main { max-width: 1000px; margin: 24px auto; padding: 0 20px; }
    h1 { font-size: 22px; } h2 { font-size: 17px; margin-top: 28px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px;
            overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eef0f3; font-size: 14px; }
    th { background: #f8fafc; color: #475569; font-weight: 600; }
    tr:hover td { background: #fafbfc; }
    a.btn, button { display: inline-block; background: #2563eb; color: #fff; border: none;
            padding: 8px 14px; border-radius: 6px; text-decoration: none; font-size: 14px;
            cursor: pointer; }
    a.btn.sec, button.sec { background: #e2e8f0; color: #1f2430; }
    a.btn.danger, button.danger { background: #dc2626; }
    .card { background: #fff; border-radius: 8px; padding: 18px 20px; margin: 14px 0;
            box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; font-size: 13px; color: #475569; margin: 10px 0 4px; font-weight: 500; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1;
            border-radius: 6px; font-size: 14px; font-family: inherit; }
    textarea { min-height: 70px; }
    .row { display: flex; gap: 16px; } .row > div { flex: 1; }
    .pill { padding: 2px 8px; border-radius: 999px; font-size: 12px; background: #e2e8f0; }
    .pill.ready { background: #dcfce7; color: #166534; }
    .pill.error { background: #fee2e2; color: #991b1b; }
    .pill.processing, .pill.pending { background: #fef9c3; color: #854d0e; }
    .muted { color: #64748b; font-size: 13px; }
    .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .inline { display: inline; }
  </style>
</head>
<body>
  <header>
    <span class="brand">📚 RAG CMS</span>
    <a href="/">Dashboard</a>
    <a href="/opportunities">Proposals</a>
    <a href="/casestudies">Case Studies</a>
    <a href="/ask">💬 Hỏi-đáp</a>
    <a href="/admin/tokens" style="margin-left:auto">🔑 Admin</a>
  </header>
  <main>
    {% block body %}{% endblock %}
  </main>
</body>
</html>
