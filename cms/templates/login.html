{% extends "base.html" %}
{% block title %}Đăng nhập Admin — RAG CMS{% endblock %}
{% block body %}
<h1>🔐 Đăng nhập Admin</h1>
<form class="card" method="post" action="/login" style="max-width:400px">
  {% if error %}<p style="color:#dc2626">{{ error }}</p>{% endif %}
  <label>Tên đăng nhập</label>
  <input name="username" required autofocus value="admin">
  <label>Mật khẩu</label>
  <input name="password" type="password" required>
  <div style="margin-top:14px"><button type="submit">Đăng nhập</button></div>
</form>
{% endblock %}
